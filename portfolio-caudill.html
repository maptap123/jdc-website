      height: 1px;
      background: var(--gold);
    }
    .hero-heading {

    .hero-sub {

      margin: 0 0 0.5rem;
    }
    .hero-count {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .gallery-section {
      padding: 5rem 5rem;
      background: #f7f5f2;
    }
    .gallery-header {
      max-width: 1200px;
      margin: 0 auto 3rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
    }
    .section-eyebrow {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .section-eyebrow::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--gold);
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.75rem, 3vw, 2.75rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--navy);
      margin: 0;
    }

    .gallery-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .gallery-item {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .gallery-item:hover img { transform: scale(1.05); }
    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(9,27,55,0);
      transition: background 0.3s ease;
    }
    .gallery-item:hover::after {
      background: rgba(9,27,55,0.15);
    }

    /* â”€â”€ LIGHTBOX â”€â”€ */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.94);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      z-index: 10;
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 2rem;
      cursor: pointer;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }
    .lightbox-close:hover { color: white; }
    .lightbox-img-wrap {
      max-width: 90vw;
      max-height: 82vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-img-wrap img {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
      box-shadow: 0 4px 60px rgba(0,0,0,0.5);
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.12); color: white; }
    .lightbox-prev { left: 2rem; }
    .lightbox-next { right: 2rem; }
    .lightbox-counter {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      font-family: 'DM Sans', sans-serif;
    }

    .back-section {
      padding: 3rem 5rem 6rem;
      text-align: center;
      background: #f7f5f2;
    }
    .back-link {

      align-items: center;
      gap: 0.65rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--navy);
      text-decoration: none;
      padding: 1rem 2.25rem;
      border: 1px solid rgba(9,27,55,0.15);
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .back-link:hover {
      border-color: var(--navy);
      background: rgba(9,27,55,0.03);
    }

      .lightbox-nav { width: 44px; height: 44px; }

      .back-section { padding: 2rem 1.25rem 4rem; }
      .lightbox-nav { width: 40px; height: 40px; }
      .lightbox-prev { left: 0.5rem; }
      .lightbox-next { right: 0.5rem; }
      .lightbox-img-wrap { max-width: 95vw; }

    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      document.getElementById('lightbox-img').src = ALL_IMAGES[currentIndex];
      document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + ALL_IMAGES.length;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox(e) {
      if (e && e.target !== document.getElementById('lightbox')) return;
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    function closeLightboxDirect() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    function navigateLightbox(dir) {
      currentIndex = (currentIndex + dir + ALL_IMAGES.length) % ALL_IMAGES.length;
      document.getElementById('lightbox-img').src = ALL_IMAGES[currentIndex];
      document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + ALL_IMAGES.length;
    }
    document.addEventListener('keydown', (e) => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('open')) return;
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
      if (e.key === 'Escape') { lb.classList.remove('open'); document.body.style.overflow = ''; }
    });
  </script>
