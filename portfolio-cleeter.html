    .gallery-item {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;

    .gallery-item img {

      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);

    .gallery-item:hover img { transform: scale(1.05); }
    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(9,27,55,0);
      transition: background 0.3s ease;
    }
    .gallery-item:hover::after {

    /* â”€â”€ LIGHTBOX â”€â”€ */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;

      flex-direction: column;
      align-items: center;

    .lightbox.open { display: flex; }
    .lightbox-close {

      right: 2rem;
      z-index: 10;
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 2rem;
      cursor: pointer;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }
    .lightbox-close:hover { color: white; }
    .lightbox-img-wrap {
      max-width: 90vw;
      max-height: 82vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-img-wrap img {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
      box-shadow: 0 4px 60px rgba(0,0,0,0.5);
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.12); color: white; }
    .lightbox-prev { left: 2rem; }
    .lightbox-next { right: 2rem; }
    .lightbox-counter {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 0.72rem;
      letter-spacing: 0.12em;

  <script>
    const ALL_IMAGES = ["https://res.cloudinary.com/dybuigweq/image/upload/v1777581008/Jobs/Cleeter/11942679e6ab44bf40fe1d89f8bda78cdeaecd05.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581009/Jobs/Cleeter/20200722-AJW_0039.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581011/Jobs/Cleeter/20200722-AJW_0043.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581726/Jobs/Cleeter/20200722-AJW_0053.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581014/Jobs/Cleeter/20200722-AJW_0066.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581016/Jobs/Cleeter/20200722-AJW_0072.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581728/Jobs/Cleeter/20200722-AJW_0077.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581731/Jobs/Cleeter/20200722-AJW_0081.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581019/Jobs/Cleeter/20200722-AJW_0089.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581733/Jobs/Cleeter/20200722-AJW_0097.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581022/Jobs/Cleeter/20200722-AJW_0103.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581024/Jobs/Cleeter/20200722-AJW_0109.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581736/Jobs/Cleeter/20200722-AJW_0112.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581026/Jobs/Cleeter/20200722-AJW_0118.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581027/Jobs/Cleeter/20200722-AJW_0125.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581739/Jobs/Cleeter/20200722-AJW_0130.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581029/Jobs/Cleeter/20200722-AJW_0133.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581031/Jobs/Cleeter/20200722-AJW_0134.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581740/Jobs/Cleeter/20200722-AJW_0135%20copy.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581742/Jobs/Cleeter/20200722-AJW_0136.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581034/Jobs/Cleeter/20200722-AJW_0142.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581035/Jobs/Cleeter/20200722-AJW_0145.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581036/Jobs/Cleeter/20200722-AJW_0151.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581744/Jobs/Cleeter/20200722-AJW_0156.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581745/Jobs/Cleeter/20200722-AJW_0164.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581747/Jobs/Cleeter/20200722-AJW_0166.jpg"];
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      document.getElementById('lightbox-img').src = ALL_IMAGES[currentIndex];
      document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + ALL_IMAGES.length;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox(e) {
      if (e && e.target !== document.getElementById('lightbox')) return;
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    function closeLightboxDirect() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    function navigateLightbox(dir) {
      currentIndex = (currentIndex + dir + ALL_IMAGES.length) % ALL_IMAGES.length;
      document.getElementById('lightbox-img').src = ALL_IMAGES[currentIndex];
      document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + ALL_IMAGES.length;
    }
    document.addEventListener('keydown', (e) => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('open')) return;
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
      if (e.key === 'Escape') { lb.classList.remove('open'); document.body.style.overflow = ''; }
    });
  </script>

  <script src="components.js"></script>
  <script>JDC.nav('portfolio');JDC.footer();</script>
</body>
</html>
