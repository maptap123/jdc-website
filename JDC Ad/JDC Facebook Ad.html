<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>JDC Construction — Facebook Ad</title>
<link rel="icon" href="assets/jdc-icon.png"/>
<link rel="stylesheet" href="ad.css"/>
<style>
  body {
    background: #1a1610;
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: "Inter", system-ui, sans-serif;
  }
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .stage-meta {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    display: flex;
    gap: 24px;
  }
  .stage-meta strong { color: #f2b900; font-weight: 500; }
  .scaler {
    transform-origin: center;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="stage-meta">
    <span><strong>JDC</strong> · Editorial Cut</span>
    <span>1080 × 1080 · 30s · Auto-loop</span>
  </div>
  <div id="root" class="scaler"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ad.jsx"></script>

<script type="text/babel">
  function App() {
    return <Ad component={AdEditorial}/>;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  // Scale the ad shell (1080 wide + controls below) to fit viewport.
  function fit() {
    const stage = document.querySelector('.scaler');
    if (!stage) return;
    const shell = stage.querySelector('.ad-shell');
    const margin = 120;
    const w = 1080;
    const h = shell ? shell.getBoundingClientRect().height / (parseFloat(stage.dataset.scale) || 1) : 1180;
    const scaleW = (window.innerWidth - margin) / w;
    const scaleH = (window.innerHeight - margin) / h;
    const scale = Math.min(1, scaleW, scaleH);
    stage.dataset.scale = scale;
    stage.style.transform = `scale(${scale})`;
    stage.style.width = w + 'px';
  }
  window.addEventListener('resize', fit);
  setTimeout(fit, 100);
  setTimeout(fit, 500);
</script>

</body>
</html>
