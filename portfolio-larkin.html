    .gallery-grid {
      max-width: 1200px;

      grid-template-columns: repeat(3, 1fr);

    .gallery-item {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);

    .gallery-item:hover img { transform: scale(1.05); }
    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(9,27,55,0);
      transition: background 0.3s ease;

    .gallery-item:hover::after {
      background: rgba(9,27,55,0.15);

    /* ГўвЂќв‚¬ГўвЂќв‚¬ LIGHTBOX ГўвЂќв‚¬ГўвЂќв‚¬ */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.94);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      z-index: 10;
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 2rem;
      cursor: pointer;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }
    .lightbox-close:hover { color: white; }
    .lightbox-img-wrap {
      max-width: 90vw;
      max-height: 82vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-img-wrap img {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
      box-shadow: 0 4px 60px rgba(0,0,0,0.5);
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.12); color: white; }
    .lightbox-prev { left: 2rem; }
    .lightbox-next { right: 2rem; }
    .lightbox-counter {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      font-family: 'DM Sans', sans-serif;
    }

g", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581100/Jobs/Larkin/20240815-AJW_9880.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581101/Jobs/Larkin/20240815-AJW_9885.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581102/Jobs/Larkin/20240815-AJW_9890.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581104/Jobs/Larkin/20240815-AJW_9895.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581105/Jobs/Larkin/20240815-AJW_9900.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581106/Jobs/Larkin/20240815-AJW_9905.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581107/Jobs/Larkin/20240815-AJW_9910.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581108/Jobs/Larkin/20240815-AJW_9915.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581109/Jobs/Larkin/20240815-AJW_9919.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581110/Jobs/Larkin/20240815-AJW_9925.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581111/Jobs/Larkin/20240815-AJW_9930.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581113/Jobs/Larkin/20240815-AJW_9935.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581114/Jobs/Larkin/20240815-AJW_9940.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581115/Jobs/Larkin/20240815-AJW_9945.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581116/Jobs/Larkin/20240815-AJW_9950.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581116/Jobs/Larkin/20240815-AJW_9951.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581117/Jobs/Larkin/20240815-AJW_9960.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581118/Jobs/Larkin/20240815-AJW_9965.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581119/Jobs/Larkin/20240815-AJW_9970.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581120/Jobs/Larkin/20240815-AJW_9975.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581121/Jobs/Larkin/20240815-AJW_9979.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581122/Jobs/Larkin/20240815-AJW_9984.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581123/Jobs/Larkin/20240815-AJW_9989.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581124/Jobs/Larkin/20240815-AJW_9995.jpg", "https://res.cloudinary.com/dybuigweq/image/upload/v1777581125/Jobs/Larkin/20240815-AJW_9999.jpg"];
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      document.getElementById('lightbox-img').src = ALL_IMAGES[currentIndex];
      document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + ALL_IMAGES.length;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox(e) {
      if (e && e.target !== document.getElementById('lightbox')) return;
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    function closeLightboxDirect() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    function navigateLightbox(dir) {
      currentIndex = (currentIndex + dir + ALL_IMAGES.length) % ALL_IMAGES.length;
      document.getElementById('lightbox-img').src = ALL_IMAGES[currentIndex];
      document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + ALL_IMAGES.length;
    }
    document.addEventListener('keydown', (e) => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('open')) return;
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
      if (e.key === 'Escape') { lb.classList.remove('open'); document.body.style.overflow = ''; }
    });
  </script>
